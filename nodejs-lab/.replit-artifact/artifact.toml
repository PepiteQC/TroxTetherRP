kind = "web"
previewPath = "/"
title = "Node.js Lab 3D"
version = "1.0.0"
id = "artifacts/nodejs-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18497

[services.development]
run = "pnpm --filter @workspace/nodejs-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nodejs-lab", "run", "build" ]
publicDir = "artifacts/nodejs-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18497"
BASE_PATH = "/"
