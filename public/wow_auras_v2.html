<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Epic Buff Auras V2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; }
canvas { display:block; }
#ui { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:100; }

#buff-bar {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; pointer-events:all; flex-wrap:wrap; justify-content:center;
    max-width:900px; padding:0 16px;
}
.buff-btn {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:rgba(0,0,0,0.78); border:1px solid rgba(255,255,255,0.13);
    border-radius:10px; padding:8px 10px; cursor:pointer;
    transition:all 0.2s; min-width:76px; color:#ccc; position:relative;
    overflow:hidden;
}
.buff-btn::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 120%, rgba(var(--cr),var(--cg),var(--cb),0.18) 0%, transparent 70%);
    opacity:0; transition:opacity 0.3s;
}
.buff-btn:hover::before { opacity:1; }
.buff-btn:hover { border-color:rgba(255,255,255,0.35); transform:translateY(-2px); }
.buff-btn.active {
    border-color:var(--c); background:rgba(var(--cr),var(--cg),var(--cb),0.18);
    color:#fff; box-shadow:0 0 14px rgba(var(--cr),var(--cg),var(--cb),0.4);
}
.buff-btn.active::before { opacity:1; }
.buff-icon {
    width:40px; height:40px; border-radius:8px; display:flex;
    align-items:center; justify-content:center; font-size:20px;
    border:1px solid rgba(255,255,255,0.12);
}
.buff-name { font-size:9.5px; text-transform:uppercase; letter-spacing:0.8px; text-align:center; line-height:1.3; }

/* Tabs */
#tab-bar {
    position:fixed; bottom:148px; left:50%; transform:translateX(-50%);
    display:flex; gap:0; pointer-events:all; border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; overflow:hidden; background:rgba(0,0,0,0.6);
}
.tab-btn {
    padding:7px 18px; font-size:11px; letter-spacing:1px; text-transform:uppercase;
    color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.2s; border:none;
    background:transparent;
}
.tab-btn:hover { color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.06); }
.tab-btn.active { color:#fff; background:rgba(255,255,255,0.12); }

#active-label {
    position:fixed; top:24px; left:50%; transform:translateX(-50%);
    font-size:13px; color:rgba(255,255,255,0.35); letter-spacing:2px; text-transform:uppercase;
    pointer-events:none; white-space:nowrap;
}
#lore-label {
    position:fixed; top:50px; left:50%; transform:translateX(-50%);
    font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:1px;
    pointer-events:none; white-space:nowrap; font-style:italic;
    transition:opacity 0.4s;
}
</style>
</head>
<body>
<div id="ui">
    <div id="active-label">Choisissez un personnage légendaire ↓</div>
    <div id="lore-label"></div>

    <div id="tab-bar">
        <button class="tab-btn active" data-tab="original">Buffs Classiques</button>
        <button class="tab-btn" data-tab="character">Auras Personnage</button>
    </div>

    <!-- ORIGINAL BUFFS -->
    <div id="buff-bar" data-panel="original">
        <div class="buff-btn" data-buff="divine" style="--c:#ffe066;--cr:255;--cg:224;--cb:102">
            <div class="buff-icon" style="background:linear-gradient(135deg,#332a00,#665500)">✦</div>
            <span class="buff-name">Bouclier Divin</span>
        </div>
        <div class="buff-btn" data-buff="void" style="--c:#b06fff;--cr:176;--cg:111;--cb:255">
            <div class="buff-icon" style="background:linear-gradient(135deg,#1a0033,#3a0066)">◈</div>
            <span class="buff-name">Vide Éternel</span>
        </div>
        <div class="buff-btn" data-buff="blood" style="--c:#ff3333;--cr:255;--cg:51;--cb:51">
            <div class="buff-icon" style="background:linear-gradient(135deg,#330000,#660000)">♦</div>
            <span class="buff-name">Rage de Sang</span>
        </div>
        <div class="buff-btn" data-buff="frost" style="--c:#00d4ff;--cr:0;--cg:212;--cb:255">
            <div class="buff-icon" style="background:linear-gradient(135deg,#001a2e,#003355)">❄</div>
            <span class="buff-name">Nova de Givre</span>
        </div>
        <div class="buff-btn" data-buff="nature" style="--c:#44ff88;--cr:68;--cg:255;--cb:136">
            <div class="buff-icon" style="background:linear-gradient(135deg,#001a0a,#003318)">✿</div>
            <span class="buff-name">Âme Ancienne</span>
        </div>
        <div class="buff-btn" data-buff="chaos" style="--c:#ff9900;--cr:255;--cg:153;--cb:0">
            <div class="buff-icon" style="background:linear-gradient(135deg,#1a0a00,#331500)">☯</div>
            <span class="buff-name">Chaos Primordial</span>
        </div>
    </div>

    <!-- CHARACTER AURAS -->
    <div id="char-bar" data-panel="character" style="display:none; position:fixed; bottom:28px; left:50%; transform:translateX(-50%); display:none; flex-wrap:wrap; gap:8px; justify-content:center; max-width:900px; pointer-events:all; padding:0 16px;">
        <div class="buff-btn" data-buff="lichking" style="--c:#88ccff;--cr:136;--cg:204;--cb:255">
            <div class="buff-icon" style="background:linear-gradient(135deg,#000a1a,#001a33)">☠</div>
            <span class="buff-name">Roi Liche</span>
        </div>
        <div class="buff-btn" data-buff="demonhunter" style="--c:#aa00ff;--cr:170;--cg:0;--cb:255">
            <div class="buff-icon" style="background:linear-gradient(135deg,#1a001a,#330033)">⚡</div>
            <span class="buff-name">Chasseur Démon</span>
        </div>
        <div class="buff-btn" data-buff="bloodmage" style="--c:#ff4400;--cr:255;--cg:68;--cb:0">
            <div class="buff-icon" style="background:linear-gradient(135deg,#200000,#3a0000)">🩸</div>
            <span class="buff-name">Mage du Sang</span>
        </div>
        <div class="buff-btn" data-buff="archmage" style="--c:#00aaff;--cr:0;--cg:170;--cb:255">
            <div class="buff-icon" style="background:linear-gradient(135deg,#00001a,#000033)">✧</div>
            <span class="buff-name">Archimage</span>
        </div>
        <div class="buff-btn" data-buff="warlord" style="--c:#ffaa00;--cr:255;--cg:170;--cb:0">
            <div class="buff-icon" style="background:linear-gradient(135deg,#1a0a00,#2a1000)">⚔</div>
            <span class="buff-name">Seigneur Guerre</span>
        </div>
        <div class="buff-btn" data-buff="timegod" style="--c:#ffffff;--cr:255;--cg:255;--cb:255">
            <div class="buff-icon" style="background:linear-gradient(135deg,#0a0a1a,#111122)">∞</div>
            <span class="buff-name">Dieu du Temps</span>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040406);
scene.fog = new THREE.FogExp2(0x040406, 0.055);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 2.2, 6.5);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.04;
controls.target.set(0, 1.6, 0);
controls.minDistance = 3; controls.maxDistance = 14;
controls.minPolarAngle = 0.2; controls.maxPolarAngle = Math.PI*0.58;

// LIGHTING
const ambient = new THREE.AmbientLight(0x111122, 1.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 10, 4); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=40;
sun.shadow.camera.left=-6; sun.shadow.camera.right=6;
sun.shadow.camera.top=8; sun.shadow.camera.bottom=-4;
sun.shadow.bias=-0.001;
scene.add(sun);
const rimL = new THREE.PointLight(0x4466ff, 2, 12);
rimL.position.set(-3, 4, -3); scene.add(rimL);
const buffLight = new THREE.PointLight(0xffffff, 0, 8);
buffLight.position.set(0, 2, 1.5); scene.add(buffLight);
const buffLight2 = new THREE.PointLight(0xffffff, 0, 6);
buffLight2.position.set(0, 0.5, 0); scene.add(buffLight2);

// GROUND
const groundMat = new THREE.MeshStandardMaterial({ color:0x0d0d14, roughness:0.9, metalness:0.2 });
const ground = new THREE.Mesh(new THREE.CircleGeometry(14,64), groundMat);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

const platMat = new THREE.MeshStandardMaterial({ color:0x14141e, roughness:0.2, metalness:0.8 });
const platform = new THREE.Mesh(new THREE.CylinderGeometry(1.8,2.0,0.12,64), platMat);
platform.position.y=0.01; platform.receiveShadow=true; platform.castShadow=true; scene.add(platform);

const runeRingGeo = new THREE.TorusGeometry(1.6, 0.025, 8, 128);
const runeRingMat = new THREE.MeshStandardMaterial({ color:0x334466, emissive:0x112244, emissiveIntensity:1, roughness:0.2 });
const runeRing = new THREE.Mesh(runeRingGeo, runeRingMat);
runeRing.rotation.x=-Math.PI/2; runeRing.position.y=0.08; scene.add(runeRing);

const gridHelper = new THREE.GridHelper(28,28,0x0a0a1a,0x080818);
gridHelper.position.y=0.001; scene.add(gridHelper);

// CHARACTER
const charGroup = new THREE.Group();
scene.add(charGroup);

function bodyMat(color, roughness=0.5, metalness=0.3) {
    return new THREE.MeshStandardMaterial({ color, roughness, metalness });
}
const parts = [];
function addPart(geo, mat, px, py, pz, sx=1, sy=1, sz=1) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(px, py, pz); m.scale.set(sx, sy, sz);
    m.castShadow=true; m.receiveShadow=true;
    charGroup.add(m); parts.push(m); return m;
}

// Body
addPart(new THREE.BoxGeometry(0.7,0.85,0.38), bodyMat(0x1a1a2a,0.7,0.2), 0,1.55,0);
addPart(new THREE.BoxGeometry(0.28,0.28,0.3), bodyMat(0x222235,0.6,0.4), -0.52,1.88,0);
addPart(new THREE.BoxGeometry(0.28,0.28,0.3), bodyMat(0x222235,0.6,0.4),  0.52,1.88,0);
addPart(new THREE.CylinderGeometry(0.12,0.10,0.52,12), bodyMat(0x161622,0.7,0.2), -0.55,1.52,0);
addPart(new THREE.CylinderGeometry(0.12,0.10,0.52,12), bodyMat(0x161622,0.7,0.2),  0.55,1.52,0);
addPart(new THREE.CylinderGeometry(0.09,0.07,0.46,10), bodyMat(0x131320,0.8,0.15), -0.55,1.15,0);
addPart(new THREE.CylinderGeometry(0.09,0.07,0.46,10), bodyMat(0x131320,0.8,0.15),  0.55,1.15,0);
addPart(new THREE.SphereGeometry(0.09,10,8), bodyMat(0x1a1a1a,0.9,0.1), -0.55,0.88,0);
addPart(new THREE.SphereGeometry(0.09,10,8), bodyMat(0x1a1a1a,0.9,0.1),  0.55,0.88,0);
addPart(new THREE.BoxGeometry(0.72,0.12,0.40), bodyMat(0x2a2015,0.5,0.5), 0,1.13,0);
addPart(new THREE.CylinderGeometry(0.16,0.14,0.52,12), bodyMat(0x181828,0.7,0.2), -0.2,0.82,0);
addPart(new THREE.CylinderGeometry(0.16,0.14,0.52,12), bodyMat(0x181828,0.7,0.2),  0.2,0.82,0);
addPart(new THREE.CylinderGeometry(0.13,0.09,0.52,10), bodyMat(0x141420,0.8,0.2), -0.2,0.44,0);
addPart(new THREE.CylinderGeometry(0.13,0.09,0.52,10), bodyMat(0x141420,0.8,0.2),  0.2,0.44,0);
addPart(new THREE.BoxGeometry(0.22,0.16,0.36), bodyMat(0x0e0e14,0.9,0.3), -0.2,0.09,0.06);
addPart(new THREE.BoxGeometry(0.22,0.16,0.36), bodyMat(0x0e0e14,0.9,0.3),  0.2,0.09,0.06);
addPart(new THREE.CylinderGeometry(0.1,0.12,0.18,10), bodyMat(0x1a1020,0.8,0.1), 0,2.04,0);
addPart(new THREE.BoxGeometry(0.48,0.54,0.44), bodyMat(0x181822,0.6,0.2), 0,2.41,0);
addPart(new THREE.BoxGeometry(0.36,0.14,0.08), bodyMat(0x080810,0.2,0.9), 0,2.44,0.22);
addPart(new THREE.BoxGeometry(0.08,0.16,0.44), bodyMat(0x222235,0.5,0.5), 0,2.7,0);

const sword = new THREE.Group();
const bladeM = new THREE.Mesh(new THREE.BoxGeometry(0.04,1.1,0.12), bodyMat(0x8899bb,0.1,0.9));
bladeM.position.y=0.55; sword.add(bladeM);
const guardM = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.06,0.08), bodyMat(0x665522,0.4,0.7));
sword.add(guardM);
const handleM = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.32,8), bodyMat(0x331100,0.8,0.2));
handleM.position.y=-0.2; sword.add(handleM);
sword.position.set(0.88,1.1,0.1); sword.rotation.z=0.15;
charGroup.add(sword);

charGroup.position.y=0.07;

// AURA SYSTEM
const auraGroup = new THREE.Group();
charGroup.add(auraGroup);

let activeBuff=null, auraObjects=[], particles=[], ptObjects=[], time=0;

// ─── ORIGINAL BUFFS ─────────────────────────────────────────────
const BUFFS_ORIGINAL = {
    divine: {
        name:'Bouclier Divin — Protection Divine',
        lore:'Aucun mal ne peut atteindre le porteur de la Lumière Sacrée.',
        color:new THREE.Color(1.0,0.88,0.2),
        color2:new THREE.Color(1.0,1.0,0.8),
        lightColor:0xffe066, build:buildDivineShield
    },
    void: {
        name:'Vide Éternel — Forme de Vide',
        lore:'L\'obscurité entre les étoiles répond à ton appel.',
        color:new THREE.Color(0.55,0.22,1.0),
        color2:new THREE.Color(0.8,0.4,1.0),
        lightColor:0xaa44ff, build:buildVoidAura
    },
    blood: {
        name:'Rage de Sang — Présence de Mort',
        lore:'Chaque blessure ne fait que renforcer ta fureur.',
        color:new THREE.Color(1.0,0.08,0.08),
        color2:new THREE.Color(1.0,0.4,0.0),
        lightColor:0xff2200, build:buildBloodAura
    },
    frost: {
        name:'Nova de Givre — Présence de Glace',
        lore:'Le souffle de Northrend fige tout sur son passage.',
        color:new THREE.Color(0.0,0.82,1.0),
        color2:new THREE.Color(0.6,0.96,1.0),
        lightColor:0x00ccff, build:buildFrostAura
    },
    nature: {
        name:'Âme Ancienne — Forme Stellaire',
        lore:'Tu deviens une constellation vivante, pure énergie cosmique.',
        color:new THREE.Color(0.1,1.0,0.4),
        color2:new THREE.Color(0.6,1.0,0.2),
        lightColor:0x22ff66, build:buildNatureAura
    },
    chaos: {
        name:'Chaos Primordial — Métamorphose',
        lore:'La réalité elle-même tremble devant ton pouvoir instable.',
        color:new THREE.Color(1.0,0.5,0.0),
        color2:new THREE.Color(1.0,0.9,0.0),
        lightColor:0xff8800, build:buildChaosAura
    }
};

// ─── CHARACTER AURAS ────────────────────────────────────────────
const BUFFS_CHARACTER = {
    lichking: {
        name:'Roi Liche — Domaine de la Mort',
        lore:'"Toi, qui traques la mort, prends garde qu\'elle ne te traque à son tour." — Arthas',
        color:new THREE.Color(0.4,0.75,1.0),
        color2:new THREE.Color(0.8,0.95,1.0),
        color3:new THREE.Color(0.0,0.3,0.6),
        lightColor:0x44aaff, build:buildLichKing
    },
    demonhunter: {
        name:'Chasseur de Démons — Métamorphose Infernale',
        lore:'"Nous sommes ce qui reste quand tout a brûlé." — Illidan Stormrage',
        color:new THREE.Color(0.6,0.0,1.0),
        color2:new THREE.Color(1.0,0.3,0.0),
        color3:new THREE.Color(0.0,0.8,0.3),
        lightColor:0x8800ff, build:buildDemonHunter
    },
    bloodmage: {
        name:'Mage du Sang — Rituel d\'Écarlate',
        lore:'"Le sang est le prix du pouvoir. Je paie volontiers." — Kael\'thas',
        color:new THREE.Color(1.0,0.15,0.0),
        color2:new THREE.Color(1.0,0.7,0.0),
        color3:new THREE.Color(0.8,0.0,0.2),
        lightColor:0xff2200, build:buildBloodMage
    },
    archmage: {
        name:'Archimage — Tempête Arcaniste',
        lore:'"La magie n\'est pas un outil, c\'est la langue de l\'univers." — Jaina Proudmoore',
        color:new THREE.Color(0.0,0.65,1.0),
        color2:new THREE.Color(0.6,0.0,1.0),
        color3:new THREE.Color(1.0,1.0,1.0),
        lightColor:0x0088ff, build:buildArchmage
    },
    warlord: {
        name:'Seigneur de Guerre — Furie de Fer',
        lore:'"La guerre forge les légendes. Je suis la guerre." — Grommash Hellscream',
        color:new THREE.Color(1.0,0.55,0.0),
        color2:new THREE.Color(1.0,0.2,0.0),
        color3:new THREE.Color(0.9,0.8,0.1),
        lightColor:0xff6600, build:buildWarlord
    },
    timegod: {
        name:'Dieu du Temps — Nexus Temporel',
        lore:'"Le passé, le présent, le futur — tout n\'est qu\'une seule et même illusion." — Nozdormu',
        color:new THREE.Color(0.9,0.9,1.0),
        color2:new THREE.Color(0.4,0.8,1.0),
        color3:new THREE.Color(0.8,0.5,1.0),
        lightColor:0xaaaaff, build:buildTimeGod
    }
};

const BUFFS = { ...BUFFS_ORIGINAL, ...BUFFS_CHARACTER };

function clearAuras() {
    auraObjects.forEach(obj => {
        if(obj.geometry) obj.geometry.dispose();
        if(obj.material) { if(Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose()); else obj.material.dispose(); }
        auraGroup.remove(obj);
    });
    auraObjects=[]; particles=[]; ptObjects=[];
    buffLight.intensity=0; buffLight2.intensity=0;
}

// ─────────────────────────────────────────────────────────────────
// ORIGINAL BUFFS (preserved exactly)
// ─────────────────────────────────────────────────────────────────
function buildDivineShield(buff) {
    const c=buff.color;
    const oGeo=new THREE.SphereGeometry(1.55,64,32);
    const oMat=new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.3,transparent:true,opacity:0.06,side:THREE.DoubleSide,roughness:0,metalness:0.8});
    const oS=new THREE.Mesh(oGeo,oMat); oS.position.y=1.5; oS.userData.type='divineOuter';
    auraGroup.add(oS); auraObjects.push(oS);
    const hGeo=new THREE.IcosahedronGeometry(1.42,2);
    const hMat=new THREE.MeshBasicMaterial({color:buff.color2,transparent:true,opacity:0.22,wireframe:true});
    const hS=new THREE.Mesh(hGeo,hMat); hS.position.y=1.5; hS.userData.type='divineHex';
    auraGroup.add(hS); auraObjects.push(hS);
    const cGeo=new THREE.SphereGeometry(1.3,32,16);
    const cMat=new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:1.8,transparent:true,opacity:0.04,side:THREE.BackSide});
    const core=new THREE.Mesh(cGeo,cMat); core.position.y=1.5; core.userData.type='divineCore';
    auraGroup.add(core); auraObjects.push(core);
    for(let i=0;i<3;i++){
        const rG=new THREE.TorusGeometry(1.52-i*0.12,0.018+i*0.004,8,128);
        const rM=new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:3-i*0.5,transparent:true,opacity:0.9-i*0.2,roughness:0,metalness:1});
        const r=new THREE.Mesh(rG,rM); r.position.y=1.5+(i-1)*0.45;
        r.userData={baseY:r.position.y,i,type:'divineRing'}; auraGroup.add(r); auraObjects.push(r);
    }
    const vRG=new THREE.TorusGeometry(1.52,0.015,8,128);
    const vRM=new THREE.MeshStandardMaterial({color:buff.color2,emissive:buff.color2,emissiveIntensity:4,transparent:true,opacity:0.85,roughness:0,metalness:1});
    const vR=new THREE.Mesh(vRG,vRM); vR.position.y=1.5; vR.userData.type='vRing';
    auraGroup.add(vR); auraObjects.push(vR);
    const vR2=vR.clone(); vR2.rotation.y=Math.PI/2; vR2.userData.type='vRing2';
    auraGroup.add(vR2); auraObjects.push(vR2);
    for(let i=0;i<90;i++) particles.push({type:'divine',angle:(i/90)*Math.PI*2+Math.random()*0.3,speed:0.5+Math.random()*0.8,r:0.4+Math.random()*1.3,y:Math.random()*3.5,size:0.022+Math.random()*0.038,alpha:0.65+Math.random()*0.35});

function buildDemonHunter(buff) {
    const c=buff.color, c2=buff.color2, c3=buff.color3;

    // Métamorphose infernale : forme d'ombre violette avec ailes démoniaques
    // Corps d'ombre
    const shadowGeo=new THREE.SphereGeometry(0.85,32,16);
    const shadowMat=new THREE.MeshStandardMaterial({color:0x0d0020,emissive:c,emissiveIntensity:0.4,transparent:true,opacity:0.25,side:THREE.DoubleSide});
    const shadow=new THREE.Mesh(shadowGeo,shadowMat); shadow.position.y=1.5; shadow.userData.type='dhShadow';
    auraGroup.add(shadow); auraObjects.push(shadow);

    // Aile gauche (courbe BézierTube)
    function makeWing(side) {
        const pts=[];
        const sx=side;
        for(let j=0;j<=20;j++){
            const t=j/20;
            const x=sx*(0.3+t*1.8);
            const y=1.5+Math.sin(t*Math.PI)*1.4-t*0.5;
            const z=-0.2+t*0.3;
            pts.push(new THREE.Vector3(x,y,z));
        }
        const wg=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),20,0.04-0.001,6,false);
        const wm=new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:3,transparent:true,opacity:0.85,roughness:0});
        const wing=new THREE.Mesh(wg,wm); wing.userData={type:'dhWing',side};
        auraGroup.add(wing); auraObjects.push(wing);
        // Membranes (3 segments fins entre veines)
        for(let k=0;k<3;k++){
            const mPts=[];
            const tBase=k*0.28;
            for(let j=0;j<=10;j++){
                const t=tBase+j/10*(0.25);
                const x2=sx*(0.3+t*1.8);
                const y2=1.5+Math.sin(t*Math.PI)*1.4-t*0.5;
                const z2=-0.2+t*0.3;
                mPts.push(new THREE.Vector3(x2+sx*(j/10)*0.3,y2-j*0.08,z2));
            }
            if(mPts.length>=2){

    for(let i=0;i<3;i++){
        const pg=new THREE.TorusGeometry(0.5+i*0.35,0.02-i*0.002,8,128);
        const pm=new THREE.MeshStandardMaterial({color:i===0?c2:i===1?c3:c,emissive:i===0?c2:i===1?c3:c,emissiveIntensity:5,transparent:true,opacity:0.8,roughness:0,metalness:1});
        const pr=new THREE.Mesh(pg,pm); pr.rotation.x=-Math.PI/2; pr.position.y=0.01-charGroup.position.y;
        pr.userData={type:'tgPortal',i,speed:(i%2===0?1:-1)*(0.15+i*0.1)};
        auraGroup.add(pr); auraObjects.push(pr);
    }
    const portalFill=new THREE.Mesh(new THREE.CircleGeometry(1.2,64),
        new THREE.MeshStandardMaterial({color:0x05050f,emissive:c3,emissiveIntensity:0.5,transparent:true,opacity:0.35}));
    portalFill.rotation.x=-Math.PI/2; portalFill.position.y=0.005-charGroup.position.y;
    auraGroup.add(portalFill); auraObjects.push(portalFill);

    // Fragments temporels (cubes tétrahédriques multiples)
    for(let i=0;i<20;i++){
        const a=(i/20)*Math.PI*2;
        const r=0.4+Math.random()*1.3;
        const h=Math.random()*3.5;
        const fg=new THREE.TetrahedronGeometry(0.04+Math.random()*0.06);
        const fm=new THREE.MeshStandardMaterial({color:i%3===0?c:i%3===1?c2:c3,emissive:i%3===0?c:i%3===1?c2:c3,emissiveIntensity:5,roughness:0,metalness:0.95,transparent:true,opacity:0.8});
        const frag=new THREE.Mesh(fg,fm);
        frag.position.set(Math.cos(a)*r,h,Math.sin(a)*r);
        frag.userData={type:'tgFrag',angle:a,r,h,rotX:Math.random()*0.06,rotY:Math.random()*0.08};
        auraGroup.add(frag); auraObjects.push(frag);
    }

    // Particules temporelles (flux de lumière blanche)
    for(let i=0;i<120;i++) particles.push({type:'timegod',angle:Math.random()*Math.PI*2,r:0.05+Math.random()*2.0,y:Math.random()*4,vy:(Math.random()-0.5)*0.015,vAngle:(Math.random()-0.5)*0.03,size:0.006+Math.random()*0.018,alpha:0.3+Math.random()*0.7,colorIdx:Math.floor(Math.random()*3)});
}

// ─────────────────────────────────────────────────────────────────
// PARTICLE RENDERER
// ─────────────────────────────────────────────────────────────────
const ptGeo=new THREE.SphereGeometry(1,6,4);

function getParticle(color, size) {
    const mat=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:6,transparent:true,roughness:0,metalness:0});
    const m=new THREE.Mesh(ptGeo,mat);
    m.scale.setScalar(size);
    auraGroup.add(m); auraObjects.push(m);
    return {mesh:m,mat};
}

function initParticlePool() {
    const buffDef=BUFFS[activeBuff]; if(!buffDef) return;
    const chaosColors=[buffDef.color,buffDef.color2||buffDef.color,new THREE.Color(1,0.1,0.1),new THREE.Color(0.8,0,1)];
    const tgColors=[buffDef.color,buffDef.color2||buffDef.color,buffDef.color3||buffDef.color];
    ptObjects=particles.map(p=>{
        let col;
        if(p.type==='chaos') col=chaosColors[p.colorIdx||0];
        else if(p.type==='archmage') col=[buffDef.color,buffDef.color2,buffDef.color3||buffDef.color][p.colorIdx||0];
        else if(p.type==='timegod') col=tgColors[p.colorIdx||0];
        else if(p.type==='dh') col=p.isFel?buffDef.color3||new THREE.Color(0,0.8,0.2):buffDef.color;
        else if(p.type==='bloodmage') col=p.hot?buffDef.color2:buffDef.color;
        else if(p.type==='warlord') col=p.hot?buffDef.color2:buffDef.color;
        else col=buffDef.color;
        return getParticle(col,p.size);
    });
}

// ─────────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────────
const label=document.getElementById('active-label');
const lore=document.getElementById('lore-label');
const allBtns=document.querySelectorAll('.buff-btn');
const tabBtns=document.querySelectorAll('.tab-btn');
const buffBarEl=document.getElementById('buff-bar');
const charBarEl=document.getElementById('char-bar');

tabBtns.forEach(tb=>{
    tb.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.classList.remove('active'));
        tb.classList.add('active');
        const which=tb.dataset.tab;
        buffBarEl.style.display=which==='original'?'flex':'none';
        charBarEl.style.display=which==='character'?'flex':'none';
    });
});

allBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
        const type=btn.dataset.buff;
        allBtns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        clearAuras();
        activeBuff=type;
        const def=BUFFS[type];
        label.textContent=def.name;
        lore.textContent=def.lore||'';
        buffLight.color.set(def.lightColor); buffLight.intensity=3.5;
        buffLight2.intensity=0;
        runeRingMat.emissive.set(def.lightColor); runeRingMat.emissiveIntensity=2; runeRingMat.color.set(def.lightColor);
        def.build(def);
        initParticlePool();
    });
});

// ─────────────────────────────────────────────────────────────────
// ANIMATION
// ─────────────────────────────────────────────────────────────────
function animate(ts) {
    requestAnimationFrame(animate);
    time=ts*0.001;
    charGroup.position.y=0.07+Math.sin(time*1.1)*0.03;

    auraObjects.forEach(obj=>{
        const d=obj.userData; if(!d||!d.type) return;

        // ── ORIGINAL ──
        if(d.type==='divineOuter'){obj.rotation.y=time*0.2;obj.rotation.x=Math.sin(time*0.3)*0.1;}
        if(d.type==='divineHex'){obj.rotation.y=-time*0.3;obj.rotation.z=time*0.15;}
        if(d.type==='divineCore'){obj.scale.setScalar(1+Math.sin(time*2)*0.04);}
        if(d.type==='divineRing'){obj.position.y=d.baseY+Math.sin(time*1.5+d.i)*0.08;obj.rotation.y=time*(0.4+d.i*0.2);}
        if(d.type==='vRing'){obj.rotation.y=time*0.6;}
        if(d.type==='vRing2'){obj.rotation.y=-time*0.5;obj.rotation.x=time*0.3;}
        if(d.type==='voidSphere'){obj.rotation.y=time*0.1;obj.scale.setScalar(1+Math.sin(time*0.8)*0.03);}
        if(d.type==='voidTube'){obj.rotation.y=time*(0.15+d.index*0.03);}
        if(d.type==='voidOrb'){const a=d.baseAngle+time*(0.5+d.i*0.07);const r=1.0+Math.sin(time*0.7+d.i)*0.25;obj.position.set(Math.cos(a)*r,1.5+Math.sin(a*0.7+d.i)*0.6,Math.sin(a)*r);obj.scale.setScalar(0.8+Math.sin(time*2+d.i)*0.3);}
        if(d.type==='voidPortal'){obj.rotation.z=-time*0.4;}
        if(d.type==='bloodMist'){obj.rotation.y=time*(0.12+d.i*0.05);obj.scale.setScalar(1+Math.sin(time*1.5+d.i)*0.05);}
        if(d.type==='bloodRing'){obj.rotation.y=time*(0.3+d.i*0.1)+d.baseAngle;obj.rotation.x+=0.001*(Math.random()-0.5)*2;}
        if(d.type==='bloodSpike'){obj.position.y=d.baseY+Math.sin(time*2+d.angle*3)*0.12;obj.scale.setScalar(0.85+Math.sin(time*2+d.angle)*0.2);}
        if(d.type==='frostShell'){obj.rotation.y=time*(d.d===0?0.15:-0.1);obj.rotation.x=time*(d.d===0?0.08:0.12);}
        if(d.type==='frostShard'){const a=d.angle+time*(0.2+d.i*0.015);obj.position.set(Math.cos(a)*d.r,d.baseH+Math.sin(time*1.2+d.i)*0.15,Math.sin(a)*d.r);}
        if(d.type==='frostRing'){obj.rotation.y=time*(0.2+d.i*0.05);obj.position.y=d.baseY+Math.sin(time+d.i)*0.05;}
        if(d.type==='frostHex'){obj.rotation.z=time*(0.1+d.i*0.08);}
        if(d.type==='natureStar'){obj.scale.setScalar(1+Math.sin(time*1.5)*0.08);obj.rotation.y=time*0.3;}
        if(d.type==='natureLeaf'){const a=d.angle+time*(0.15+d.ring*0.06+d.i*0.003);obj.position.set(Math.cos(a)*d.r,d.baseH+Math.sin(time+d.i)*0.2,Math.sin(a)*d.r);}
        if(d.type==='natureStar2'){const a=d.angle+time*(0.3+d.i*0.04);obj.position.set(Math.cos(a)*1.2,1.5+Math.sin(time*0.8+d.i)*0.7,Math.sin(a)*1.2);obj.scale.setScalar(0.7+Math.sin(time*2+d.i)*0.5);}
        if(d.type==='natureVine'){obj.rotation.y=time*0.2*(d.v%2===0?1:-1);}
        if(d.type==='natureCircle'){obj.rotation.z=time*(0.12+d.i*0.06);}
        if(d.type==='chaosShell'){obj.rotation.y+=d.rotSpeed*0.016;obj.rotation.x+=d.rotSpeed*0.009;obj.scale.setScalar(1+Math.sin(time*3+d.i)*0.05);}
        if(d.type==='chaosArc'){obj.rotation.x+=d.rotX;obj.rotation.y+=d.rotY;}
        if(d.type==='chaosShard'){const a=d.angle+time*0.4;obj.position.set(Math.cos(a)*d.r,d.h+Math.sin(time*2+d.angle)*0.3,Math.sin(a)*d.r);obj.rotation.y+=d.rotSpeed;}

        // ── ROI LICHE ──
        if(d.type==='lichSphere'){obj.rotation.y=time*(0.05+d.i*0.04)*(d.i%2===0?1:-1);obj.scale.setScalar(1+Math.sin(time*0.6+d.i*1.5)*0.03);}
        if(d.type==='lichRune'){obj.rotation.y=-time*0.18;obj.rotation.x=time*0.1;}
        if(d.type==='lichSword'){obj.position.y=d.baseY+Math.sin(time*0.7)*0.18;obj.rotation.z=-0.2+Math.sin(time*0.5)*0.08;obj.rotation.y=Math.sin(time*0.3)*0.15;}
        if(d.type==='lichSoul'){const a=d.angle+time*d.speed;const r=d.r+Math.sin(time*1.2+d.i)*0.18;obj.position.set(Math.cos(a)*r,d.baseH+Math.sin(time*0.8+d.i)*0.22,Math.sin(a)*r);obj.scale.setScalar(0.6+Math.sin(time*2+d.i)*0.5);}
        if(d.type==='lichCrown'){obj.rotation.y=time*(0.25+d.i*0.12);obj.position.y=d.baseY+Math.sin(time*1+d.i)*0.06;}
        if(d.type==='lichPortal'){obj.rotation.z=-time*0.22;}
        if(d.type==='lichHalo'){obj.position.y=2.9+Math.sin(time*1.5)*0.07;obj.rotation.z=time*0.3;}

        // ── CHASSEUR DE DÉMONS ──
        if(d.type==='dhShadow'){obj.scale.setScalar(1+Math.sin(time*1.8)*0.07);obj.rotation.y=time*0.2;}
        if(d.type==='dhEye'){obj.scale.setScalar(0.8+Math.sin(time*3+d.i*1.5)*0.4);}
        if(d.type==='dhGlaive'){const t2=time*(0.8+d.side*0.1);obj.rotation.y=t2;obj.position.y=d.baseY+Math.sin(time*0.6+d.side)*0.2;obj.position.x=d.baseX+Math.cos(time*0.4)*0.1;}

        // ── MAGE DU SANG ──
        if(d.type==='bmPhoenix'){obj.rotation.y=time*(0.25+d.idx*0.1);}
        if(d.type==='bmPlasma'){obj.scale.setScalar(1+Math.sin(time*2.5)*0.1);obj.rotation.y=time*0.4;}
        if(d.type==='bmCrystal'){const a=d.angle+time*(0.3+d.i*0.02);obj.position.set(Math.cos(a)*d.r,d.baseH+Math.sin(time*1.5+d.i)*0.2,Math.sin(a)*d.r);obj.rotation.x+=d.rotSpeed;obj.rotation.y+=d.rotSpeed*1.3;}
        if(d.type==='bmFlame'){obj.position.y=d.baseH+Math.abs(Math.sin(time*3+d.angle*4))*0.3;obj.scale.y=0.8+Math.sin(time*4+d.angle)*0.4;obj.scale.x=0.8+Math.cos(time*3+d.angle)*0.2;}
        if(d.type==='bmSigil'){obj.rotation.z=time*0.35;}

        // ── ARCHIMAGE ──
        if(d.type==='amNeb'){obj.rotation.y=time*0.04;}
        if(d.type==='amDisc'){obj.rotation.y+=d.speed*0.016;obj.position.y=d.baseY+Math.sin(time*0.5+d.i)*0.08;}
        if(d.type==='amCube'){obj.rotation.y+=0.018;obj.rotation.x+=0.011;obj.rotation.z+=0.008;}
        if(d.type==='amStar'){const a=d.angle+time*(0.22+d.i*0.04);const r=d.r+Math.sin(time*0.6+d.i)*0.15;obj.position.set(Math.cos(a)*r,1.4+Math.sin(time*0.4+d.i)*0.5,Math.sin(a)*r);obj.rotation.y+=0.03;}
        if(d.type==='amStaff'){obj.position.y=d.baseY+Math.sin(time*0.7)*0.2;obj.position.z=d.baseZ+Math.cos(time*0.5)*0.1;obj.rotation.z=0.25+Math.sin(time*0.4)*0.08;}
        if(d.type==='amArc'){obj.rotation.x+=d.rx;obj.rotation.y+=d.ry;}
        if(d.type==='amHex'){obj.rotation.z=time*(0.12+d.i*0.08)*(d.i%2===0?1:-1);}

        // ── SEIGNEUR DE GUERRE ──
        if(d.type==='warlordShell'){obj.rotation.y=time*(0.08+d.i*0.04)*(d.i%2===0?1:-1);obj.scale.setScalar(1+Math.sin(time*1.8+d.i)*0.04);}
        if(d.type==='warlordAxe'){obj.position.y=d.baseY+Math.sin(time*0.65)*0.22;obj.rotation.y=Math.sin(time*0.45)*0.25;obj.position.x=d.baseX+Math.cos(time*0.4)*0.08;}
        if(d.type==='warlordChain'){obj.rotation.y=time*(0.2+d.ch*0.05);}
        if(d.type==='warlordFireRing'){obj.rotation.y=time*0.55;obj.position.y=d.baseY+Math.sin(time*1.2)*0.1;}
        if(d.type==='warlordShard'){const a=d.angle+time*0.35;obj.position.set(Math.cos(a)*d.r,d.h+Math.sin(time*1.8+d.angle)*0.2,Math.sin(a)*d.r);obj.rotation.y+=d.rotSpeed;}
        if(d.type==='warlordCircle'){obj.rotation.z=time*0.28;}

        // ── DIEU DU TEMPS ──
        if(d.type==='tgShell'){obj.rotation.y+=d.rotY;obj.rotation.x+=d.rotX;obj.rotation.z+=d.rotZ;obj.scale.setScalar(1+Math.sin(time*0.5+d.i)*0.025);}
        if(d.type==='tgGrid'){obj.rotation.y+=d.speed*0.012;obj.rotation.x+=d.speed*0.006;}
        if(d.type==='tgClock'){obj.rotation.y+=d.speed*0.015;obj.rotation.x=d.tilt+Math.sin(time*0.3+d.i)*0.1;}
        if(d.type==='tgHourglass'){obj.rotation.y+=0.025;obj.scale.setScalar(1+Math.sin(time*0.8)*0.06);}
        if(d.type==='tgPortal'){obj.rotation.z+=d.speed*0.015;}
        if(d.type==='tgFrag'){const a=d.angle+Math.sin(time*0.3+d.r)*0.5;obj.position.set(Math.cos(a)*d.r,d.h+Math.sin(time*0.6+d.angle)*0.35,Math.sin(a)*d.r);obj.rotation.x+=d.rotX;obj.rotation.y+=d.rotY;}
    });

    // Particles
    const buffDef=activeBuff?BUFFS[activeBuff]:null;
    particles.forEach((p,idx)=>{
        const obj=ptObjects[idx]; if(!obj) return;

        if(p.type==='divine'){p.y+=p.speed*0.012;if(p.y>3.5)p.y=-0.3;const a=p.angle+time*0.2;obj.mesh.position.set(Math.cos(a)*p.r,p.y,Math.sin(a)*p.r);}
        if(p.type==='void'){p.y+=p.vy;p.angle+=p.rotSpeed;if(p.y>3.5)p.y=-0.3;if(p.y<-0.3)p.y=3.5;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='blood'){p.y+=p.vy;if(p.y>4)p.y=0;const a=p.angle+time*0.3;obj.mesh.position.set(Math.cos(a)*p.r,p.y,Math.sin(a)*p.r);}
        if(p.type==='frost'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y<-0.3)p.y=3.5;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='nature'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>3.5)p.y=0;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='chaos'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>3.8)p.y=-0.2;if(p.y<-0.2)p.y=3.8;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}

        // ── NEW CHAR PARTICLES ──
        if(p.type==='lichfrost'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y<-0.3)p.y=4;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='dh'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>4)p.y=0;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='bloodmage'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>4)p.y=0;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='archmage'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>3.8)p.y=-0.2;if(p.y<-0.2)p.y=3.8;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='warlord'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>4.2)p.y=0;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}
        if(p.type==='timegod'){p.y+=p.vy;p.angle+=p.vAngle;if(p.y>4)p.y=-0.2;if(p.y<-0.2)p.y=4;obj.mesh.position.set(Math.cos(p.angle)*p.r,p.y,Math.sin(p.angle)*p.r);}

        const pulse=0.7+Math.sin(time*3+idx*0.5)*0.35;
        obj.mesh.scale.setScalar(p.size*pulse);
        obj.mat.opacity=p.alpha*pulse*0.8;
    });

    if(activeBuff){
        buffLight.intensity=2.5+Math.sin(time*2)*1.0;
        rimL.intensity=2+Math.sin(time*1.3)*0.8;
        if(buffLight2.intensity>0) buffLight2.intensity=2+Math.sin(time*2.5+1)*1.0;
    }

    charGroup.rotation.y=Math.sin(time*0.2)*0.4;
    controls.update();
    renderer.render(scene,camera);
}

animate(0);

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
